name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          pip install --upgrade pip
          # Install without PyMC — it is too heavy for CI (compilation + large deps).
          # PyMC tests are skipped via the "pymc" marker below.
          pip install -e ".[dev]"

      - name: Run API tests (no PyMC required)
        run: |
          pytest tests/ -v -m "not pymc" --tb=short

      - name: Check import and version
        run: |
          python -c "import bayesian_pricing; print(bayesian_pricing.__version__)"
